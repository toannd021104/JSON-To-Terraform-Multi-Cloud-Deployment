#cloud-config
runcmd:
- [sh, -c, 'mkdir -p /opt/test-dir && chmod 0755 /opt/test-dir && chown root:root
    /opt/test-dir']
- [sh, -c, 'ln -sf /opt/test /opt/test-symlink && chmod 0755 /opt/test-symlink &&
    chown root:root /opt/test-symlink']
- timeout 10 /tmp/cloud-init-exec-0-3e8291f4.sh
- /tmp/cloud-init-exec-1-48f33de8.sh
- /tmp/cloud-init-exec-2-fd533a45.sh
- echo 'Simple command without options'
write_files:
- path: /opt/test
  owner: root:root
  permissions: '0644'
  content: |
    Original file!
- path: /opt/test-source
  owner: root:root
  permissions: '0755'
  source:
    uri: https://raw.githubusercontent.com/canonical/cloud-init/main/doc/examples/cloud-config.txt
- path: /tmp/cloud-init-exec-0-3e8291f4.sh
  permissions: '0755'
  owner: root:root
  content: |
    #!/bin/bash
    set -e
    umask 0022
    export TEST_ENV=production
    export TEST_DATE=$(date +%Y%m%d)
    cd /tmp
    if [ ! -e /tmp/test-app.log ] && [ -d /tmp ]; then
      echo 'Test file created at '$(date) > /tmp/test-app.log
    fi
- path: /tmp/cloud-init-exec-1-48f33de8.sh
  permissions: '0755'
  owner: root:root
  content: |
    #!/bin/bash
    set -e
    if [ ! -f /tmp/test-app.log ]; then
      echo 'Directory listing:' && ls -lah /tmp/test-*
    fi
- path: /tmp/cloud-init-exec-2-fd533a45.sh
  permissions: '0755'
  owner: root:root
  content: |
    #!/bin/bash
    set -e
    if [ -w /tmp ]; then
      echo 'System uptime:' && uptime > /tmp/uptime.log
    fi
groups:
- devops
- monitoring
- docker
- toanquoc
users:
- default
- name: user
  gecos: DevOps Student
  primary_group: devops
  shell: /bin/bash
  uid: 1111
  expiredate: '2025-12-31'
  plain_text_passwd: plain_password
  lock_passwd: false
  ssh_authorized_keys:
  - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFakeBase64HereOnlyAsExample comment
  sudo: ALL=(ALL) NOPASSWD:ALL
  create_groups: true
- name: prometheus
  gecos: System monitoring user
  primary_group: monitoring
  shell: /bin/false
  plain_text_passwd: prometheus
  lock_passwd: false
  no_create_home: true
- name: ubuntu1
  gecos: Ubuntu Test User
  primary_group: toanquoc
  shell: /bin/bash
  plain_text_passwd: ubuntu
  lock_passwd: false
  sudo: ALL=(ALL) NOPASSWD:ALL
packages:
- git
- traceroute
package_upgrade: false
ssh_deletekeys: true
ssh_genkeytypes: [ed25519, rsa]
ssh_quiet_keygen: true
ssh_publish_hostkeys:
  enabled: true
  blacklist: [rsa]
allow_public_ssh_keys: true
disable_root: true
disable_root_opts: no-port-forwarding,no-agent-forwarding,no-X11-forwarding
bootcmd:
- [mkdir, -p, /run/early-setup]
- [sh, -c, echo 'bootcmd started at $(date)' >> /var/log/cloud-init.log]
swap:
  filename: /swapfile
  size: 1G
  maxsize: 2G
apt:
  preserve_sources_list: false
  primary:
  - arches:
    - default
    uri: http://archive.ubuntu.com/ubuntu
growpart:
  mode: auto
  devices: [/]
  ignore_growroot_disabled: true
resize_rootfs: true
power_state:
  delay: now
  mode: reboot
  message: Rebooting to apply package updates...
  timeout: 30
  condition: [/usr/bin/test, -f, /var/run/reboot-required]
package_reboot_if_required: true
package_update: false
hostname: toanquoc
preserve_hostname: false
create_hostname_file: true
fqdn: toanquocfpdn.example.com
prefer_fqdn_over_hostname: false
manage_etc_hosts: false
timezone: Asia/Ho_Chi_Minh
locale: en_US.UTF-8
